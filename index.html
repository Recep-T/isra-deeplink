<!DOCTYPE html>
<html>
<head>
    <title>Isra - Join Circle</title>
    <meta property="og:title" content="Join Isra Circle" />
    <meta property="og:description" content="You have been invited to a collective circle. Click to join." />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Parametreleri al
            const zikirId = urlParams.get('id');    // Kolektif Zikir için
            const groupId = urlParams.get('group'); // Kolektif Hatim için

            let deepLink = "israapp://join";

            // 1. Senaryo: Eğer linkte 'id' varsa (Zikir)
            if (zikirId) {
                deepLink += "?joinHalka=" + zikirId;
            } 
            // 2. Senaryo: Eğer linkte 'group' varsa (Hatim)
            else if (groupId) {
                deepLink += "?group=" + groupId;
            }

            // Yedek butonu güncelle
            document.getElementById('manual-link').href = deepLink;

            // Uygulamayı açmayı dene
            window.location.href = deepLink;

            // Fallback: Uygulama yoksa App Store'a yönlendir
            const fallback = setTimeout(function() {
                window.location.href = "https://apps.apple.com/app/id6756538182";
            }, 3000);

            window.onblur = function() {
                clearTimeout(fallback);
            };
        };
    </script>
    </head>
<body>
    <div class="card">
        <p>Opening ISRA app...</p>
        <a id="manual-link" href="#" class="btn">Join Circle Now</a>
    </div>
</body>
</html>
